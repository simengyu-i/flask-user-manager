<!-- 调试信息 - 注册页面 -->
{% extends "base.html" %}
{% block content %}
<div class="card card-login">
    <h2>用户注册</h2>
    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/register">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" placeholder="请输入邮箱">
        </div>
        <div class="form-group">
            <label for="phone">手机号</label>
            <input type="text" id="phone" name="phone" placeholder="请输入手机号">
        </div>
        <button type="submit" class="btn btn-block">注册</button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:13px;color:#999;">
        已有账号？<a href="/login" style="color:#667eea;">去登录</a>
    </p>
</div>
{% endblock %}
