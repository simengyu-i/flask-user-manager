<!-- 调试信息 - 头像上传页面 -->
{% extends "base.html" %}
{% block content %}
<div class="card card-login">
    <h2>上传头像</h2>

    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if file_url %}
        <div class="upload-success">
            <p style="color:green;font-weight:600;margin-bottom:12px;">✅ 上传成功！</p>
            <img src="{{ file_url }}" alt="头像预览" style="max-width:200px;max-height:200px;border-radius:8px;border:2px solid #eee;display:block;margin:0 auto 12px;">
            <p style="text-align:center;font-size:13px;word-break:break-all;">
                文件链接：<a href="{{ file_url }}" target="_blank">{{ file_url }}</a>
            </p>
            <hr style="margin:20px 0;">
            <p style="text-align:center;">
                <a href="/upload" class="btn">继续上传</a>
                <a href="/" class="btn" style="margin-left:8px;background:#666;">返回首页</a>
            </p>
        </div>
    {% endif %}

    <form method="post" action="/upload" enctype="multipart/form-data">
        <div class="form-group">
            <label for="file">选择头像文件</label>
            <input type="file" id="file" name="file" required>
        </div>
        <button type="submit" class="btn btn-block">上传</button>
    </form>
</div>
{% endblock %}
