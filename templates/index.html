{% extends "base.html" %}
{% block content %}
{% if user %}
    <div class="card">
        <h2>欢迎回来，{{ user.username }}！</h2>
        <table class="info-table">
            <tr><td>用户名</td><td>{{ user.username }}</td></tr>
            <tr><td>密码</td><td>{{ user.password }}</td></tr>
            <tr><td>邮箱</td><td>{{ user.email }}</td></tr>
            <tr><td>手机</td><td>{{ user.phone }}</td></tr>
            <tr><td>角色</td><td>{{ user.role }}</td></tr>
            <tr><td>余额</td><td>{{ user.balance }}</td></tr>
        </table>
        <a href="/logout" class="btn btn-danger">退出登录</a>
    </div>
{% else %}
    <div class="card card-center">
        <h2>请先登录</h2>
        <p>您需要登录后才能访问用户信息。</p>
        <a href="/login" class="btn">前往登录</a>
    </div>
{% endif %}
{% endblock %}
