name: Python 测试

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: 检查应用能否启动
        run: |
          python -c "
import json, os

# 创建临时配置文件
os.makedirs('/tmp/test_config', exist_ok=True)
os.chdir('/tmp/test_config')

with open('config.json', 'w') as f:
    json.dump({'secret_key': 'test-key', 'port': 5000, 'debug': False}, f)

with open('users.json', 'w') as f:
    json.dump({
        'admin': {
            'username': 'admin',
            'password': 'scrypt:32768:8:1\$fake\$hash',
            'role': 'admin',
            'email': 'admin@test.com',
            'phone': '13800138000',
            'balance': 99999
        }
    }, f)

# 复制 app.py 到临时目录
import shutil
shutil.copy('${{ github.workspace }}/app.py', 'app.py')
shutil.copy('${{ github.workspace }}/templates', 'templates',)

# 导入测试（不启动服务器）
import importlib.util
spec = importlib.util.spec_from_file_location('app', 'app.py')
mod = importlib.util.module_from_spec(spec)
spec.loader.exec_module(mod)

print('✅ 应用加载成功')
print(f'  用户数: {len(mod.USERS)}')
print(f'  密钥已设置: {bool(mod.app.secret_key)}')
"
